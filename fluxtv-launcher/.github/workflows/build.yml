name: Build FluxTV APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x fluxtv-launcher/gradlew

      - name: Build release APK
        working-directory: fluxtv-launcher
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FluxTV-AndroidTV
          path: fluxtv-launcher/app/build/outputs/apk/release/FluxTV-AndroidTV-release.apk
          retention-days: 30
